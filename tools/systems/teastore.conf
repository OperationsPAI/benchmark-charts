# TeaStore — Descartes Java stack.
# Handled specially in build-images.sh: delegates to upstream
# tools/build_images.sh instead of per-image docker buildx.
SYS=teastore
FORK_URL=https://github.com/LGU-SE-Internal/TeaStore.git
FORK_DIR=/tmp/teastore-lgu

# Image list below is for --verify-only manifest checks; actual build
# is driven by upstream tools/build_images.sh -m -b -p.
IMAGES=(
  "teastore-base"
  "teastore-registry"
  "teastore-db"
  "teastore-persistence"
  "teastore-auth"
  "teastore-image"
  "teastore-recommender"
  "teastore-webui"
  "teastore-httploadgen"
  "teastore-httploaddirector"
  "teastore-jmeter"
)

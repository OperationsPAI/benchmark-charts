sn: 9397c2e        # github.com/LGU-SE-Internal/DeathStarBench (socialNetwork)
media: 9397c2e     # github.com/LGU-SE-Internal/DeathStarBench (mediaMicroservices)
teastore: 2b3fd43  # github.com/LGU-SE-Internal/TeaStore

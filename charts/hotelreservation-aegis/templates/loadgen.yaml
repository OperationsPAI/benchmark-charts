{{- /*
Continuous load generator. See socialnetwork-aegis for rationale.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  labels:
    app: loadgen
    service: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
        service: loadgen
    spec:
      containers:
      - name: wrk2
        image: {{ .Values.loadgen.image | default "docker.io/opspai/dsb-wrk2:20260421" }}
        imagePullPolicy: IfNotPresent
        env:
        - name: TARGET_URL
          value: {{ .Values.loadgen.targetUrl | quote }}
        - name: LUA_SCRIPT
          value: {{ .Values.loadgen.luaScript | quote }}
        - name: THREADS
          value: {{ .Values.loadgen.threads | default 2 | quote }}
        - name: CONNS
          value: {{ .Values.loadgen.connections | default 20 | quote }}
        - name: DURATION
          value: {{ .Values.loadgen.duration | default "30s" | quote }}
        - name: RATE
          value: {{ .Values.loadgen.rate | default 10 | quote }}
        resources:
          limits: { cpu: "200m", memory: "128Mi" }
          requests: { cpu: "50m", memory: "64Mi" }

{{- /*
Custom deployment: swaps jaegertracing/all-in-one for otel-collector-contrib.
Receives Jaeger spans on the ports DSB clients target (UDP 6831/6832, TCP
14268) and forwards them via OTLP to the aegis otel-collector -> ClickHouse
pipeline. Keeps service name "jaeger" so unchanged DSB configs still resolve.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: {{ .Values.name }}
  name: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicas | default .Values.global.replicas }}
  selector:
    matchLabels:
      service: {{ .Values.name }}
  template:
    metadata:
      labels:
        service: {{ .Values.name }}
        app: {{ .Values.name }}
    spec:
      containers:
      - name: otel-collector
        image: {{ .Values.container.otelImage | default "otel/opentelemetry-collector-contrib:0.100.0" }}
        imagePullPolicy: {{ .Values.global.imagePullPolicy | default "IfNotPresent" }}
        args:
        - --config=/etc/otelcol/config.yaml
        ports:
        - containerPort: 6831
          protocol: UDP
        - containerPort: 6832
          protocol: UDP
        - containerPort: 14268
        volumeMounts:
        - name: otel-config
          mountPath: /etc/otelcol
      volumes:
      - name: otel-config
        configMap:
          name: {{ .Values.name }}-otel-config
      hostname: {{ .Values.name }}
      restartPolicy: {{ .Values.restartPolicy | default .Values.global.restartPolicy }}

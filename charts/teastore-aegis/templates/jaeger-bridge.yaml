{{- /*
Jaeger->OTLP bridge. TeaStore's jaeger-client-java pushes UDP compact-thrift
to $JAEGER_AGENT_HOST:6831 (we inject JAEGER_AGENT_HOST=jaeger into each
microservice statefulset). This otel-collector-contrib receives those spans
and forwards them via OTLP to the aegis collector -> ClickHouse pipeline.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-otel-config
data:
  config.yaml: |
    receivers:
      jaeger:
        protocols:
          thrift_compact:
            endpoint: 0.0.0.0:6831
          thrift_binary:
            endpoint: 0.0.0.0:6832
          thrift_http:
            endpoint: 0.0.0.0:14268
    processors:
      batch: {}
    exporters:
      otlp:
        endpoint: {{ .Values.otlpEndpoint | default "otel-collector.otel.svc.cluster.local:4317" }}
        tls:
          insecure: true
    service:
      pipelines:
        traces:
          receivers: [jaeger]
          processors: [batch]
          exporters: [otlp]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  labels:
    app: jaeger
    service: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
        service: jaeger
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.100.0
        imagePullPolicy: IfNotPresent
        args: ["--config=/etc/otelcol/config.yaml"]
        ports:
        - containerPort: 6831
          protocol: UDP
        - containerPort: 6832
          protocol: UDP
        - containerPort: 14268
        volumeMounts:
        - name: otel-config
          mountPath: /etc/otelcol
      volumes:
      - name: otel-config
        configMap:
          name: jaeger-otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  labels:
    app: jaeger
    service: jaeger
spec:
  selector:
    app: jaeger
  ports:
  - name: udp-compact
    port: 6831
    targetPort: 6831
    protocol: UDP
  - name: udp-binary
    port: 6832
    targetPort: 6832
    protocol: UDP
  - name: http
    port: 14268
    targetPort: 14268
    protocol: TCP

# ExternalName Service replacing what the opentelemetry-collector subchart
# would have deployed. Every demo component's default env
# OTEL_COLLECTOR_NAME=otel-collector makes them dial otel-collector:4317; this
# Service resolves that name to the cluster-wide collector.
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Release.Namespace }}
spec:
  type: ExternalName
  externalName: {{ .Values.clusterCollector.service }}
  ports:
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: otlp-http
    port: 4318
    targetPort: 4318
    protocol: TCP

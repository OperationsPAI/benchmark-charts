# Cluster-wide OTel collector (otel-kube-stack deployment collector) that the
# shim ExternalName resolves to.
clusterCollector:
  service: otel-collector.otel.svc.cluster.local

opentelemetry-demo:
  # Inject k8s.pod.name + k8s.namespace.name into every component's OTLP
  # resource attributes. The cluster collector's k8sattributes processor uses
  # these as pod_association keys to enrich traces, and the
  # transform/service_namespace processor rewrites service.namespace from
  # k8s.namespace.name so BuildDatapack can filter by the injected namespace.
  # Without this the demo's hardcoded service.namespace=opentelemetry-demo
  # never gets rewritten and abnormal_traces.parquet comes out empty.
  default:
    envOverrides:
      - name: OTEL_K8S_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: OTEL_K8S_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: k8s.pod.name=$(OTEL_K8S_POD_NAME),k8s.namespace.name=$(OTEL_K8S_NAMESPACE)

  # Disable the in-chart collector; we route OTLP to the cluster collector via
  # the ExternalName shim (templates/otel-shim.yaml). Keeping the Service name
  # stable (otel-collector) preserves the default env OTEL_COLLECTOR_NAME that
  # every demo component uses.
  opentelemetry-collector:
    enabled: false

  # Demo observability stack disabled — the cluster otel-kube-stack pipeline
  # owns traces/metrics/logs. Re-enable locally if someone needs the demo UI.
  jaeger:
    enabled: false
  grafana:
    enabled: false
  prometheus:
    enabled: false
  opensearch:
    enabled: false

# Cluster-wide OTel collector (otel-kube-stack deployment collector) that the
# demo's in-namespace collector exports to.
global:
  clusterCollector:
    service: otel-collector.otel.svc.cluster.local

opentelemetry-demo:
  # Keep pod + namespace identity on the emitted OTLP resources. The local demo
  # collector can enrich by connection metadata, and the upstream cluster
  # collector still uses these attributes when it rewrites service.namespace for
  # namespace-scoped datasets.
  default:
    envOverrides:
      - name: OTEL_K8S_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: OTEL_K8S_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: k8s.pod.name=$(OTEL_K8S_POD_NAME),k8s.namespace.name=$(OTEL_K8S_NAMESPACE)

  # Keep the in-chart collector so every demo namespace always has a local
  # otel-collector Service. This avoids cross-namespace DNS indirection and
  # lets the wrapper forward everything upstream over a single OTLP exporter.
  opentelemetry-collector:
    enabled: true
    presets:
      # Disable the kubernetesAttributes preset so the demo collector stays
      # namespace-scoped and does not create ClusterRole/ClusterRoleBinding
      # objects. App pods already inject k8s.pod.name + k8s.namespace.name, and
      # the cluster collector performs the cluster-wide enrichment/export path.
      kubernetesAttributes:
        enabled: false
    config:
      exporters:
        otlp:
          endpoint: "{{ .Values.global.clusterCollector.service }}:4317"
          tls:
            insecure: true
      service:
        pipelines:
          traces:
            exporters: [otlp, spanmetrics]
          metrics:
            exporters: [otlp]
          logs:
            exporters: [otlp]

  # Demo observability stack disabled — the cluster otel-kube-stack pipeline
  # owns traces/metrics/logs. Re-enable locally if someone needs the demo UI.
  jaeger:
    enabled: false
  grafana:
    enabled: false
  prometheus:
    enabled: false
  opensearch:
    enabled: false

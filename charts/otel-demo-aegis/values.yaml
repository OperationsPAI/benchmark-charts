# Downstream OTel collector that the demo's in-namespace collector exports to.
# Default points at the per-namespace aegis sidecar collector deployed by this
# chart (see .Values.otelCollector below) which exports directly to ClickHouse.
# Override with --set global.clusterCollector.service=<host> (no port) to fall
# back to a cross-namespace shared cluster collector — typical when
# otelCollector.enabled=false. Leave the cross-ns FQDN here as a reference:
#   service: opentelemetry-kube-stack-deployment-otel-demo-collector.monitoring.svc.cluster.local
global:
  clusterCollector:
    service: aegis-otel-collector

# Per-namespace OTel collector sidecar.
#
# Deploys a single-replica otel-collector-contrib in the release namespace so
# each otel-demo install gets its own sending_queue and exports directly to
# ClickHouse, instead of all namespaces fanning into one shared cluster-wide
# collector that saturates and silently drops spans (aegis #366, #367).
#
# The data path becomes:
#   demo apps -> demo's in-ns "otel-collector" (otlp/transform/spanmetrics)
#             -> this chart's "aegis-otel-collector" (k8sattributes/clickhouse)
#             -> ClickHouse
#
# Disable to skip the sidecar — also override .global.clusterCollector.service
# to point at a shared collector reachable from this namespace.
otelCollector:
  enabled: true
  # Distinct from the upstream demo subchart's own "otel-collector" Deployment
  # which already exists in the release namespace; collision would break both.
  name: aegis-otel-collector
  replicas: 1
  image:
    # docker.io/opspai mirror; volces auto-mirrors to
    # pair-cn-shanghai.cr.volces.com/opspai/opentelemetry-collector-contrib.
    repository: docker.io/opspai/opentelemetry-collector-contrib
    tag: "0.142.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  clickhouse:
    endpoint: "tcp://clickstack-clickhouse-clickhouse-headless.monitoring.svc.cluster.local:9000?dial_timeout=10s&compress=lz4&username=default"
    database: otel
    tracesTableName: otel_traces
    metricsTableName: otel_metrics
    logsTableName: otel_logs
    ttl: 72h
    timeout: 30s
  sendingQueue:
    enabled: true
    numConsumers: 10
    queueSize: 5000
    blocking: true
  batch:
    sendBatchSize: 2000
    sendBatchMaxSize: 4000
    timeout: 5s
  memoryLimiter:
    limitPercentage: 75
    spikeLimitPercentage: 15

opentelemetry-demo:
  # Mirror upstream images to opspai dockerhub so the volces auto-mirror
  # (pair-cn-shanghai.cr.volces.com/opspai/*) can serve them on clusters
  # that can't reach docker.io / ghcr.io directly. Without these overrides,
  # busybox init containers stay in ImagePullBackOff and kafka never starts,
  # which then keeps every wait-for-kafka init blocked forever.
  components:
    kafka:
      imageOverride:
        repository: docker.io/opspai/otel-demo-kafka
        tag: "2.2.0"
      initContainers: []
    accounting:
      initContainers:
        - name: wait-for-kafka
          image: docker.io/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]
    cart:
      initContainers:
        - name: wait-for-valkey-cart
          image: docker.io/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 valkey-cart 6379; do echo waiting for valkey-cart; sleep 2; done;"]
    checkout:
      initContainers:
        - name: wait-for-kafka
          image: docker.io/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]
    fraud-detection:
      initContainers:
        - name: wait-for-kafka
          image: docker.io/opspai/busybox:latest
          command: ["sh", "-c", "until nc -z -v -w30 kafka 9092; do echo waiting for kafka; sleep 2; done;"]
    flagd:
      initContainers:
        - name: init-config
          image: docker.io/opspai/busybox:latest
          command: ["sh", "-c", "cp /config-ro/demo.flagd.json /config-rw/demo.flagd.json && cat /config-rw/demo.flagd.json"]
          volumeMounts:
            - mountPath: /config-ro
              name: config-ro
            - mountPath: /config-rw
              name: config-rw

  # Keep pod + namespace identity on the emitted OTLP resources. The local demo
  # collector can enrich by connection metadata, and the upstream cluster
  # collector still uses these attributes when it rewrites service.namespace for
  # namespace-scoped datasets.
  default:
    envOverrides:
      - name: OTEL_K8S_POD_NAME
        valueFrom:
          fieldRef:
            fieldPath: metadata.name
      - name: OTEL_K8S_NAMESPACE
        valueFrom:
          fieldRef:
            fieldPath: metadata.namespace
      - name: OTEL_RESOURCE_ATTRIBUTES_EXTRA
        value: k8s.pod.name=$(OTEL_K8S_POD_NAME),k8s.namespace.name=$(OTEL_K8S_NAMESPACE)

  # Keep the in-chart collector so every demo namespace always has a local
  # otel-collector Service. This avoids cross-namespace DNS indirection and
  # lets the wrapper forward everything upstream over a single OTLP exporter.
  opentelemetry-collector:
    enabled: true
    # Run as a single Deployment, not a per-node DaemonSet. The cluster already
    # runs `monitoring/opentelemetry-kube-stack-daemon` for host/kubelet/pod
    # metrics + container logs; the only job of THIS in-namespace collector is
    # to receive demo-app OTLP and forward to the cluster collector. A daemonset
    # variant also collides on hostPort 4317/4318 with the cluster daemon and
    # leaves every pod Pending (benchmark-charts#9).
    mode: deployment
    # Force-disable cluster-scoped RBAC creation for parallel-install safety.
    # The opentelemetry-collector subchart's clusterrole.yaml renders if ANY
    # of these are enabled: clusterRole.create OR presets.kubernetesAttributes
    # OR presets.clusterMetrics OR presets.kubeletMetrics OR
    # presets.kubernetesEvents OR presets.annotationDiscovery.{logs,metrics}.
    # The opentelemetry-demo subchart's defaults turn several of these on, so
    # disabling kubernetesAttributes alone is NOT enough — the ClusterRole
    # `otel-collector` still gets rendered and the second parallel install
    # into a sibling namespace fails with "ClusterRole exists and cannot be
    # imported into the current release: invalid ownership metadata"
    # (helm.sh/release-name mismatch). Disable every triggering knob below
    # so multiple otel-demoN installs can coexist.
    clusterRole:
      create: false
    presets:
      kubernetesAttributes:
        enabled: false
      clusterMetrics:
        enabled: false
      kubeletMetrics:
        enabled: false
      kubernetesEvents:
        enabled: false
      annotationDiscovery:
        logs:
          enabled: false
        metrics:
          enabled: false
    # Replace the repo-local otel-demo collector config so the wrapper can drop
    # ClickHouse and export all signals to the cluster collector instead.
    alternateConfig:
      exporters:
        debug: {}
        otlp:
          endpoint: "{{ .Values.global.clusterCollector.service }}:4317"
          tls:
            insecure: true
      extensions:
        health_check:
          endpoint: ${env:MY_POD_IP}:13133
      processors:
        batch: {}
        memory_limiter:
          check_interval: 5s
          limit_percentage: 80
          spike_limit_percentage: 25
        resourcedetection:
          detectors: [env, system]
        transform:
          error_mode: ignore
          trace_statements:
            - context: span
              conditions:
                - span.kind == SPAN_KIND_SERVER and resource.attributes["service.name"] == "frontend" and span.attributes["http.route"] == nil
              statements:
                - set(span.attributes["http.route"], "/api/cart") where IsMatch(span.attributes["http.target"], "\\/api\\/cart")
                - set(span.attributes["http.route"], "/api/checkout") where IsMatch(span.attributes["http.target"], "\\/api\\/checkout")
                - set(span.attributes["http.route"], "/api/products/{productId}") where IsMatch(span.attributes["http.target"], "\\/api\\/products\\/.*")
                - set(span.attributes["http.route"], "/api/recommendations") where IsMatch(span.attributes["http.target"], "\\/api\\/recommendations")
                - set(span.attributes["http.route"], "/api/data") where IsMatch(span.attributes["http.target"], "\\/api\\/data.*")
        resource:
          attributes:
            - key: service.instance.id
              from_attribute: k8s.pod.uid
              action: insert
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: ${env:MY_POD_IP}:4317
            http:
              endpoint: ${env:MY_POD_IP}:4318
              cors:
                allowed_origins:
                  - "http://*"
                  - "https://*"
        httpcheck/frontend-proxy:
          targets:
            - endpoint: http://frontend-proxy:8080
        nginx:
          endpoint: http://image-provider:8081/status
          collection_interval: 10s
        postgresql:
          endpoint: "postgresql:5432"
          username: "otelu"
          password: "otelp"
          metrics:
            postgresql.blks_hit:
              enabled: true
            postgresql.blks_read:
              enabled: true
            postgresql.tup_fetched:
              enabled: true
            postgresql.tup_returned:
              enabled: true
            postgresql.tup_inserted:
              enabled: true
            postgresql.tup_updated:
              enabled: true
            postgresql.tup_deleted:
              enabled: true
            postgresql.deadlocks:
              enabled: true
          tls:
            insecure: true
        redis:
          endpoint: "valkey-cart:6379"
          username: "valkey"
          collection_interval: 10s
      connectors:
        spanmetrics: {}
      service:
        extensions:
          - health_check
        pipelines:
          traces:
            receivers: [otlp]
            processors: [memory_limiter, resourcedetection, resource, transform, batch]
            exporters: [otlp, debug, spanmetrics]
          metrics:
            receivers: [httpcheck/frontend-proxy, nginx, otlp, postgresql, redis, spanmetrics]
            processors: [memory_limiter, resourcedetection, resource, batch]
            exporters: [otlp, debug]
          logs:
            receivers: [otlp]
            processors: [memory_limiter, resourcedetection, resource, batch]
            exporters: [otlp, debug]
        telemetry:
          metrics:
            level: detailed
            readers:
              - periodic:
                  interval: 10000
                  timeout: 5000
                  exporter:
                    otlp:
                      protocol: http/protobuf
                      endpoint: http://otel-collector:4318
                      insecure: true

  # Demo observability stack disabled — the cluster otel-kube-stack pipeline
  # owns traces/metrics/logs. Re-enable locally if someone needs the demo UI.
  jaeger:
    enabled: false
  grafana:
    enabled: false
  prometheus:
    enabled: false
  opensearch:
    enabled: false

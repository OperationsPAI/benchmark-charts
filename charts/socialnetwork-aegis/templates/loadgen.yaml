{{- /*
Continuous load generator. DSB upstream ships wrk2 scripts but expects the
operator to drive load manually; aegis regression needs self-contained load
during the fault window so abnormal_traces.parquet has data. This Deployment
keeps wrk2 running against nginx-thrift in a forever loop.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  labels:
    app: loadgen
    service: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
        service: loadgen
    spec:
      containers:
      - name: wrk2
        image: {{ .Values.loadgen.image | default "docker.io/opspai/dsb-wrk2:20260421" }}
        imagePullPolicy: IfNotPresent
        env:
        - name: TARGET_URL
          value: {{ .Values.loadgen.targetUrl | default "http://nginx-thrift:8080/wrk2-api/post/compose" | quote }}
        - name: LUA_SCRIPT
          value: {{ .Values.loadgen.luaScript | default "/scripts/social-network/compose-post.lua" | quote }}
        - name: THREADS
          value: {{ .Values.loadgen.threads | default 2 | quote }}
        - name: CONNS
          value: {{ .Values.loadgen.connections | default 20 | quote }}
        - name: DURATION
          value: {{ .Values.loadgen.duration | default "30s" | quote }}
        - name: RATE
          value: {{ .Values.loadgen.rate | default 10 | quote }}
        - name: max_user_index
          value: "200"
        resources:
          limits: { cpu: "200m", memory: "128Mi" }
          requests: { cpu: "50m", memory: "64Mi" }

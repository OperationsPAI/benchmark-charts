sockshop:
  global:
    # Aegis-published images (docker.io/opspai) — rebuilt from
    # LGU-SE-Internal/coherence-helidon-sockshop-sample. Frontend image
    # from YifanYang6/front-end.
    imageRegistry: docker.io/opspai
    imageTag: "2.12.3"
    imagePullPolicy: IfNotPresent
    coherenceCluster: SockShop
  otel:
    # Keep collector and instrumentation references configurable so this chart
    # can run against different aegis cluster layouts without patching the
    # vendored sockshop templates.
    collectorEndpoint: "http://opentelemetry-kube-stack-deployment-collector.monitoring:4317"
    instrumentation: "monitoring/opentelemetry-kube-stack"
  frontend:
    enabled: true
    replicas: 1
    image:
      repository: ss-frontend
      tag: "propagator"
    env:
      otelExporterEndpoint: "http://opentelemetry-kube-stack-deployment-collector.monitoring:4317"
    # ClusterIP keeps kind happy (no LB provider); fault injection is pod-label
    # targeted so external access is not required for aegis workflows.
    service:
      type: ClusterIP
      port: 80
      targetPort: 8079
    # Upstream's readOnlyRootFilesystem breaks the Node container (npm cache
    # needs to be writable). Let the pod write to /tmp via emptyDir rather
    # than fight the root-fs lock.
    securityContext:
      runAsNonRoot: true
      runAsUser: 10001
      readOnlyRootFilesystem: false
  loadgen:
    enabled: true
    load:
      # Same-namespace service discovery is enough here; avoid a hardcoded
      # namespace-qualified DNS name so parallel installs work unchanged.
      targetHost: "http://front-end"
  coherence:
    # Service monitors require prometheus-operator CRDs. Most aegis clusters
    # don't install them, so turn off ServiceMonitor creation to keep
    # RestartPedestal's helm install from failing on unknown kind.
    serviceMonitor:
      enabled: false
    readinessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10

name: release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  release-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3

      - name: Log in to Docker Hub (OCI registry)
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" \
            | helm registry login registry-1.docker.io -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Package and push new chart versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          mkdir -p dist

          for chart_dir in charts/*/; do
            name="$(helm show chart "$chart_dir" | awk '/^name:/{print $2}')"
            version="$(helm show chart "$chart_dir" | awk '/^version:/{print $2}')"
            tag="chart/${name}-${version}"

            if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
              echo "SKIP ${tag} (tag exists)"
              continue
            fi

            echo "RELEASE ${tag}"
            helm dependency update "$chart_dir" || true
            helm package "$chart_dir" --destination dist
            helm push "dist/${name}-${version}.tgz" oci://registry-1.docker.io/opspai

            git tag "$tag"
            git push origin "$tag"
          done
